version: "3"

services:
  database:
    container_name: book_shelves
    image: mysql:latest
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - 3306:3306
    environment:
      MYSQL_ROOT_PASSWORD: 'root'
      MYSQL_DATABASE: 'book_app'
      MYSQL_USER: 'user'
      MYSQL_PASSWORD: 'bookapp'
    volumes:
      - ./script/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: