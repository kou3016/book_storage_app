<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>Detailed Information</title>
</head>
<body>
  <h1>Book Detail</h1>

  <table border="1">
    <thead>
      <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Author</th>
        <th>Volumes</th>
        <th>Publisher</th>
        <th>ISBN</th>
        <th>Genre</th>
        <th>Status</th>
        <th>Total Reading Time</th>
        <th>Created At</th>
        <th>Updated At</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td th:text="${book.id}">id</td>
        <td th:text="${book.title}">title</td>
        <td th:text="${book.author}">author</td>
        <td th:text="${book.volumes}">volumes</td>
        <td th:text="${book.publisher}">publisher</td>
        <td th:text="${book.isbn}">isbn</td>
        <td th:text="${book.genre}">genre</td>
        <td th:text="${book.status}">status</td>
        <td th:text="${book.totalReadingTime}">time</td>
        <td th:text="${book.createdAt}">created</td>
        <td th:text="${book.updatedAt}">updated</td>
      </tr>
    </tbody>
  </table>
    <div style="margin-top: 12px;">
      <a th:href="@{/}">Back to List</a>
    </div>
</body>
</html>
